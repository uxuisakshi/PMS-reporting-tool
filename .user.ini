; Per-directory PHP settings — applied by PHP-FPM and mod_php alike
; Overrides php.ini defaults so PHPSESSID is never created

; Session hardening
session.name = PMS_SESSION
session.cookie_httponly = On
session.cookie_secure = On
session.cookie_samesite = Strict
session.use_only_cookies = On
session.use_strict_mode = On
